<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#12141c">
<title>IconCraft — Editor de Ícones</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="mark"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div>
    Icon<em>Craft</em>
  </div>
  <div class="hd-sep"></div>
  <button class="btn" id="btnRevert" title="Voltar os traços processados ao desenho original">Reverter</button>
  <div class="hd-sep"></div>
  <button class="btn" id="btnMirror" title="Espelho ao vivo (vertical, horizontal ou desligado)">
    <svg id="mirrorIcon" viewBox="0 0 24 24"><path d="M11 2h2v20h-2zM3 6l5 6-5 6V6zm18 0v12l-5-6 5-6z"/></svg>
    <span id="mirrorLbl">Espelho: off</span>
  </button>
  <div class="hd-sep"></div>
  <button class="btn sm" id="btnUndo" title="Desfazer (Ctrl+Z)">↩</button>
  <button class="btn sm" id="btnRedo" title="Refazer (Ctrl+Y)">↪</button>
  <div class="spacer"></div>
  <button class="btn" id="btnExportSvg">SVG</button>
  <button class="btn" id="btnExportPng">PNG</button>
  <div class="hd-sep"></div>
  <button class="btn" id="themeBtn" title="Alternar tema claro/escuro"><svg id="themeIcon" viewBox="0 0 24 24"></svg></button>
</header>

<main>
  <nav id="toolbox">
    <button class="tool" data-tool="draw" title="Desenhar (D)">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </button>
    <button class="tool" data-tool="shape" title="Forma geométrica — escolha no painel e arraste no canvas (G)">
      <svg viewBox="0 0 24 24"><path d="M12 2l5 8H7l5-8zm-6.5 20a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9zM13 13h9v9h-9v-9z"/></svg>
    </button>
    <button class="tool" data-tool="erase" title="Pincel negativo — desenha transparência (E)">
      <svg viewBox="0 0 24 24"><path d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.53a4.008 4.008 0 0 1-5.66 0L2.81 17c-.78-.79-.78-2.05 0-2.84l10.6-10.6c.79-.78 2.05-.78 2.83 0zM4.22 15.58l3.54 3.53c.78.79 2.04.79 2.83 0l3.53-3.53-6.36-6.36-3.54 3.53c-.78.79-.78 2.05 0 2.83z"/></svg>
    </button>
    <button class="tool" data-tool="bucket" title="Balde de tinta — preenche regiões de cor sólida (B)">
      <svg viewBox="0 0 24 24"><path d="M19 11l-8-8-1.4 1.4 1.8 1.8-6.6 6.6c-.6.6-.6 1.5 0 2.1l5.2 5.2c.3.3.7.4 1 .4s.8-.1 1-.4l7-7c.6-.6.6-1.5 0-2.1zM6.2 13L11 8.2 15.8 13H6.2zM20.5 15s-1.5 2.7-1.5 4c0 .8.7 1.5 1.5 1.5S22 19.8 22 19c0-1.3-1.5-4-1.5-4z"/></svg>
    </button>
    <div class="tool-sep"></div>
    <button class="tool on" data-tool="select" title="Selecionar e mover (S)">
      <svg viewBox="0 0 24 24"><path d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2 1-3.2-7.4L7 18.5z"/></svg>
    </button>
    <button class="tool" data-tool="modify" title="Modificar objeto selecionado (M)">
      <svg viewBox="0 0 24 24"><path d="M12 2l4 4-4 4-4-4 4-4zm-6 6l4 4-4 4-4-4 4-4zm12 0l4 4-4 4-4-4 4-4zm-6 6l4 4-4 4-4-4 4-4z"/></svg>
    </button>
    <button class="tool" data-tool="nodes" title="Editar nós — clique num traço e arraste os pontos (N)">
      <svg viewBox="0 0 24 24"><path d="M5 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm14 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM5 5c4 0 6 2 7 7s3 7 7 7" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="5" cy="5" r="2.4"/><circle cx="19" cy="19" r="2.4"/><circle cx="12" cy="12" r="2"/></svg>
    </button>
    <button class="tool" data-tool="smooth" id="btnSmoothTool" title="Suavizar traço: do reto ao redondo (S)">
      <svg viewBox="0 0 24 24"><path d="M2.5 16c3.2-9 6.3 9 9.5 0s6.3 9 9.5 0" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
    </button>
    <button class="tool" data-tool="ref" title="Mover imagem de referência (R)">
      <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
    </button>
    <button class="tool" data-tool="pan" title="Mover e ampliar (arrastar / pinça) — P">
      <svg viewBox="0 0 24 24"><path d="M13 6v5h5V7.75L22.25 12 18 16.25V13h-5v5h3.25L12 22.25 7.75 18H11v-5H6v3.25L1.75 12 6 7.75V11h5V6H7.75L12 1.75 16.25 6z"/></svg>
    </button>
    <button class="tool" data-tool="layers" id="btnLayers" title="Camadas — ordenar objetos (L)">
      <svg viewBox="0 0 24 24"><path d="M12 2 2 8l10 6 10-6-10-6zm0 13.5L3.5 10 2 11l10 6 10-6-1.5-1L12 15.5zM2 15l10 6 10-6-1.5-1L12 19 3.5 14 2 15z"/></svg>
    </button>
    <button class="tool" id="btnSaveTool" title="Exportar SVG ou PNG">
      <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
    </button>
    <div class="tool-sep"></div>
    <button class="tool" id="btnClearAll" title="Limpar tudo">
      <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
    </button>
  </nav>
  <button id="leftArrow" title="Abrir ferramentas"><svg viewBox="0 0 24 24"><path d="M7.41 15.41 12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg></button>
  <button id="mobileFab" title="Ferramentas"></button>
<button id="panelReopen" title="Abrir propriedades"><svg viewBox="0 0 24 24"><path d="M7.41 15.41 12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg></button>
<button id="mobileNav" title="Selecionar / Mover tela"></button>
<div id="orderFabs">
  <button id="orderUp" title="Trazer para frente">▲</button>
  <button id="orderDown" title="Enviar para trás">▼</button>
</div>
<button id="colorFab" title="Cor de linha e preenchimento ativas">
    <svg viewBox="0 0 32 32"><circle id="colorBtnCirc" cx="16" cy="16" r="9"/></svg>
  </button>
  <button id="mobileProps" title="Propriedades"><svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg></button>

  <div id="workspace">
    <div id="propsHud" style="display:none">
      <svg id="propsDot" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
      <span id="propsText"></span>
    </div>
    <div id="board">
      <img id="refImg" alt="" draggable="false">
      <svg id="underlay"></svg>
      <canvas id="composite"></canvas>
      <svg id="overlay"></svg>
    </div>
  </div>

  <aside id="panel"></aside>
</main>

<div class="popmenu" id="mirrorMenu">
  <button data-mirror="off"><svg viewBox="0 0 24 24"><path d="M2 5h20v14H2z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>Sem espelho</button>
  <button data-mirror="v"><svg viewBox="0 0 24 24"><path d="M11 2h2v20h-2zM3 6l5 6-5 6V6zm18 0v12l-5-6 5-6z"/></svg>Espelho vertical</button>
  <button data-mirror="h"><svg viewBox="0 0 24 24" style="transform:rotate(90deg)"><path d="M11 2h2v20h-2zM3 6l5 6-5 6V6zm18 0v12l-5-6 5-6z"/></svg>Espelho horizontal</button>
</div>

<div class="popmenu" id="clearMenu">
  <button data-clear="sel"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>Excluir selecionados</button>
  <button data-clear="all"><svg viewBox="0 0 24 24"><path d="M15 16h4v2h-4zm0-8h7v2h-7zm0 4h6v2h-6zM3 18c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2V8H3v10zM14 5h-3l-1-1H6L5 5H2v2h12z"/></svg>Excluir tudo</button>
</div>

<div class="popmenu" id="exportMenu">
  <button data-export="svg"><svg viewBox="0 0 24 24"><path d="M9.4 16.6 4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0 4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>Exportar SVG</button>
  <button data-export="png"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>Exportar PNG</button>
</div>

<div class="toast-wrap" id="toasts"></div>

<div id="eyedropOverlay" aria-hidden="true">
  <div id="eyedropBar">
    <span id="eyedropSwatch"></span>
    <span id="eyedropHex">#------</span>
    <span id="eyedropTag">Conta-gotas ativo — toque no desenho</span>
  </div>
  <div id="eyedropHint">Toque para provar a cor · pinça amplia · arraste com um dedo</div>
  <div id="eyedropActions">
    <button class="btn" id="eyedropCancel">Cancelar</button>
    <button class="btn primary" id="eyedropApply">Aplicar</button>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
